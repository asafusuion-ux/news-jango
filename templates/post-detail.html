{% extends 'base.html' %}
{% block content %}

    <div class="container">
        <div class="row"> 
            <div class="col-lg-12">
                <div class="card p-2">
                    <img width="300px" class="img-thumbnail" src="{{article.img.url}}">
                    <h2>{{article.title}}</h2>
                    <p>{{article.description}}</p>
                </div>
            </div> 
        </div> 
    </div>

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>


{% endblock content %}
