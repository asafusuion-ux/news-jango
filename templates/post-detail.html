{% extends 'base.html' %}
{% block content %}

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4 text-center">
                {% if article.img %}
                <img class="img-fluid rounded mb-3" src="{{article.img.url}}">
                {% endif %}
                <p>{{article.title}}</p>
                <p>{{article.description}}</p>
                <p>{{article.data}}</p>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
